# ============================================================================
#  Configuración del panel de administración (Decap CMS)
#  Edita cursos, posts, testimonios y textos desde formularios.
# ============================================================================

backend:
  name: github
  repo: sebastiangonzalesm/apuntes-de-sebas
  branch: main
  # El login se resuelve con las Cloudflare Pages Functions del propio sitio
  # (/oauth y /callback). base_url debe ser el dominio donde abres /admin.
  # Cuando conectes apuntesdesebas.blog, cambia base_url a https://apuntesdesebas.blog
  base_url: https://apuntes-de-sebas.pages.dev
  auth_endpoint: /oauth

# Permite probar el panel en local con `npx decap-server` (solo en localhost).
local_backend: true

# Los nombres de archivo (slugs de URL) sin tildes ni caracteres raros.
slug:
  encoding: ascii
  clean_accents: true

# Carpeta para imágenes que subas desde el panel.
media_folder: public/uploads
public_folder: /uploads

site_url: https://apuntes-de-sebas.pages.dev
display_url: https://apuntes-de-sebas.pages.dev

collections:
  # ----------------------------- CURSOS -----------------------------
  - name: cursos
    label: Cursos
    label_singular: Curso
    description: La biblioteca de apuntes. Cada curso genera su propia página.
    folder: src/content/cursos
    extension: json
    format: json
    create: true
    slug: '{{fields.titulo | slugify}}'
    identifier_field: titulo
    summary: '{{titulo}} · {{area}}'
    fields:
      - { name: titulo, label: Título del curso, widget: string }
      - name: descripcion
        label: Descripción
        widget: text
        required: false
        hint: 'De qué trata el curso, en 2-4 líneas. Aparece en la página del curso.'
      - name: area
        label: Área
        widget: select
        hint: 'El área define el color de la tarjeta y el ícono por defecto.'
        options:
          - Derecho
          - Economía
          - Administración
          - Contabilidad
          - Finanzas
          - Humanidades
          - Ciencias Sociales y Política
          - Matemática
          - Estrategia
          - Marketing
          - Tecnología
          - Innovación
          - Logística
          - Supply Chain
          - Management
      - name: profesor
        label: Profesor
        widget: string
        required: false
        default: Por confirmar
        hint: 'Deja "Por confirmar" si aún no lo sabes.'
      - { name: ciclo, label: Ciclo, widget: string, required: false, hint: 'Ej: 2015-1' }
      - name: universidad
        label: Universidad
        widget: string
        required: false
        default: Universidad del Pacífico
      - name: tips
        label: Tips para sobrevivir el curso
        widget: list
        required: false
        summary: '{{fields.tip}}'
        field: { name: tip, label: Tip, widget: string }
      # Ícono OPCIONAL. Vacío = ícono automático del área. El buscador filtra
      # al escribir. El color NO se elige aquí: se asigna solo según el área.
      - name: icono
